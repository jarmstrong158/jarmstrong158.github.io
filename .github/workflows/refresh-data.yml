name: Refresh hub data

# Regenerates data.json from live GitHub data (repos, contributions, registry).
on:
  schedule:
    - cron: "17 6 * * *"          # daily ~06:17 UTC
  push:
    paths:
      - "data/projects.meta.json"  # re-run when curation changes
      - "scripts/build_data.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build data.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_data.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- data.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: refresh hub data.json"
            git push
          else
            echo "data.json unchanged"
          fi
